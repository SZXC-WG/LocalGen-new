name: Qt Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (GCC, x86_64)
            os: ubuntu-24.04
            qt_arch: linux_gcc_64
            qt_tools: ''
            package_name: linux-x86_64-gcc.AppImage

          - name: Linux (GCC, ARM64)
            os: ubuntu-24.04-arm
            qt_arch: linux_gcc_arm64
            qt_tools: ''
            package_name: linux-arm64-gcc.AppImage

          - name: macOS (Clang, x86_64)
            os: macos-15-intel
            qt_arch: clang_64
            qt_tools: ''
            package_name: macos-x86_64-clang.dmg

          - name: macOS (Clang, ARM64)
            os: macos-15
            qt_arch: clang_64
            qt_tools: ''
            package_name: macos-arm64-clang.dmg

          - name: Windows (MSVC, x86_64)
            os: windows-2025
            qt_arch: win64_msvc2022_64
            qt_tools: ''
            msvc_arch: amd64
            package_name: windows-x86_64-msvc.zip

          - name: Windows (MSVC, ARM64)
            os: windows-2025
            qt_arch: win64_msvc2022_arm64_cross_compiled
            qt_tools: ''
            msvc_arch: amd64_arm64
            package_name: windows-arm64-msvc.zip

          - name: Windows (MinGW, x86_64)
            os: windows-2025
            qt_arch: win64_mingw
            qt_tools: 'tools_mingw1310'
            package_name: windows-x86_64-mingw.zip

          - name: Windows (LLVM, x86_64)
            os: windows-2025
            qt_arch: win64_llvm_mingw
            qt_tools: 'tools_llvm_mingw1706'
            package_name: windows-x86_64-llvm-mingw.zip

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          arch: ${{ matrix.qt_arch }}
          tools: ${{ matrix.qt_tools }}
          modules: qtcharts
          cache: true

      - name: Setup MSVC
        if: contains(matrix.qt_arch, 'msvc')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build
        shell: bash
        run: |
          cmake -B build -S . -G "Ninja Multi-Config" \
            -DCMAKE_TOOLCHAIN_FILE=$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          cmake --build build --config Release

      - name: Install Linux packaging tools
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/linuxdeploy"
          cd "$RUNNER_TEMP/linuxdeploy"
          linuxdeploy_arch="$(uname -m)"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-${linuxdeploy_arch}.AppImage -O linuxdeploy.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-appimage-${linuxdeploy_arch}.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-qt-${linuxdeploy_arch}.AppImage
          chmod +x *.AppImage
          echo "$RUNNER_TEMP/linuxdeploy" >> "$GITHUB_PATH"

      - name: Deploy and Package
        id: package
        shell: bash
        run: |
          package_name="${{ matrix.package_name }}"
          asset_name="LocalGen-ci-${GITHUB_SHA::7}-${package_name}"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

          if [ "$RUNNER_OS" == "Linux" ]; then
            mkdir -p AppDir/usr/bin AppDir/usr/share/doc/localgen
            cp -a build/Release/{maps,fonts} AppDir/usr/bin/
            cp LICENSE AppDir/usr/share/doc/localgen/LICENSE.txt
            export APPIMAGE_EXTRACT_AND_RUN=1
            export QMAKE="$QT_ROOT_DIR/bin/qmake"
            export LD_LIBRARY_PATH="$QT_ROOT_DIR/lib:${LD_LIBRARY_PATH:-}"
            export OUTPUT="$asset_name"
            linuxdeploy.AppImage \
              --appdir AppDir \
              --plugin qt \
              --output appimage \
              --executable build/Release/LocalGen-new \
              --desktop-file res/localgen.desktop \
              --icon-file res/img/favicon.png \
              --icon-filename localgen
          elif [ "$RUNNER_OS" == "Windows" ]; then
            mkdir -p deploy
            mv build/Release/{LocalGen-new.exe,maps,fonts} deploy/
            mv LICENSE deploy/LICENSE.txt
            windeployqt=("$QT_ROOT_DIR/bin/windeployqt")
            if [[ "${{ matrix.qt_arch }}" == *"arm64"* ]]; then
              windeployqt=("$QT_HOST_PATH/bin/windeployqt" --qtpaths "$QT_ROOT_DIR/bin/qtpaths.bat")
            fi
            if [[ "${{ matrix.qt_arch }}" == *"llvm"* ]]; then
              "${windeployqt[@]}" --no-opengl-sw --no-translations --no-compiler-runtime deploy/*.exe
              cp "$QT_ROOT_DIR/bin/"{libc++.dll,libunwind.dll} deploy/
            else
              "${windeployqt[@]}" --release --no-opengl-sw --no-translations --compiler-runtime deploy/*.exe
            fi
            7z a -tzip -mx=9 "$asset_name" ./deploy/*
          elif [ "$RUNNER_OS" == "macOS" ]; then
            MACDEPLOYQT_EXECUTABLE="$QT_ROOT_DIR/bin/macdeployqt" bash scripts/package-macos-dmg.sh build/Release/LocalGen-new.app "$asset_name"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: ${{ steps.package.outputs.asset_name }}
          archive: false
          if-no-files-found: error
