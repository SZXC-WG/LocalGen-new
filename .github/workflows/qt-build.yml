name: Qt Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            qt_arch: linux_gcc_64

          - os: macos-latest
            compiler: llvm
            qt_arch: clang_64

          - os: windows-latest
            compiler: msvc
            qt_arch: win64_msvc2022_64

          - os: windows-latest
            compiler: gcc
            qt_arch: win64_mingw

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup C++
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          ninja: true
          cache-tools: false

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          arch: ${{ matrix.qt_arch }}
          cache: false

      - name: Build
        run: cmake -B build -G Ninja && cmake --build build
