name: Qt Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (GCC)
            os: ubuntu-latest
            qt_arch: linux_gcc_64
            qt_tools: 'tools_cmake tools_ninja'

          - name: macOS (Clang)
            os: macos-latest
            qt_arch: clang_64
            qt_tools: 'tools_cmake tools_ninja'

          - name: Windows (MSVC)
            os: windows-latest
            qt_arch: win64_msvc2022_64
            qt_tools: 'tools_cmake tools_ninja tools_vcredist,qt.tools.vcredist_msvc2022_x64'

          - name: Windows (MinGW)
            os: windows-latest
            qt_arch: win64_mingw
            qt_tools: 'tools_cmake tools_ninja tools_mingw1310'

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          arch: ${{ matrix.qt_arch }}
          tools: ${{ matrix.qt_tools }}
          cache: false

      - name: Build
        shell: bash
        run: |
          cmake -B build -S . -G Ninja -DCMAKE_TOOLCHAIN_FILE=$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake
          cmake --build build -j4 --config Release
