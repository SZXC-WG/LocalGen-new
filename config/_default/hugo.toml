baseURL = 'https://szxc-wg.github.io/'
title = 'LocalGen'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
hasCJKLanguage = true
enableRobotsTXT = true
summaryLength = 36

[pagination]
  pagerSize = 12

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[imaging]
  quality = 85
  resampleFilter = 'CatmullRom'
  anchor = 'smart'

[params]
  description = 'The multilingual project website for Local Generals.io by SZXC Work Group.'
  organization = 'SZXC Work Group'
  projectName = 'Local Generals.io'
  projectShortName = 'LocalGen'
  projectVersion = '6.0.0'
  license = 'GPL-3.0'
  websiteLicense = 'GPL-3.0'
  websiteRepo = 'https://github.com/SZXC-WG/szxc-wg.github.io'
  siteUrl = 'https://szxc-wg.github.io/'
  sourceRepo = 'https://github.com/SZXC-WG/LocalGen-new'
  releasesUrl = 'https://github.com/SZXC-WG/LocalGen-new/releases'
  issuesUrl = 'https://github.com/SZXC-WG/LocalGen-new/issues'
  pullsUrl = 'https://github.com/SZXC-WG/LocalGen-new/pulls'
  discussionsUrl = 'https://github.com/SZXC-WG/LocalGen-new/discussions'
  actionsUrl = 'https://github.com/SZXC-WG/LocalGen-new/actions'
  communityEmail = 'lzhang0903@outlook.com'
  copyright = 'SZXC Work Group'

[languages]
  [languages.en]
    label = 'English'
    locale = 'en-US'
    contentDir = 'content'
    weight = 1
    title = 'LocalGen'
  [languages.zh]
    label = '中文'
    locale = 'zh-CN'
    contentDir = 'content'
    weight = 2
    title = 'LocalGen'
  [languages.ja]
    label = '日本語'
    locale = 'ja-JP'
    contentDir = 'content'
    weight = 3
    title = 'LocalGen'
  [languages.ko]
    label = '한국어'
    locale = 'ko-KR'
    contentDir = 'content'
    weight = 4
    title = 'LocalGen'
  [languages.fr]
    label = 'Français'
    locale = 'fr-FR'
    contentDir = 'content'
    weight = 5
    title = 'LocalGen'
  [languages.es]
    label = 'Español'
    locale = 'es-ES'
    contentDir = 'content'
    weight = 6
