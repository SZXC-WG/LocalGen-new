baseURL = 'https://szxc-wg.github.io/'
title = 'LocalGen'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
hasCJKLanguage = true
enableRobotsTXT = true
summaryLength = 36

[pagination]
  pagerSize = 12

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[imaging]
  quality = 85
  resampleFilter = 'CatmullRom'
  anchor = 'smart'

[params]
  description = 'Project documentation site for Local Generals.io.'
  organization = 'SZXC Work Group'
  projectName = 'LocalGen Docs'
  projectShortName = 'LocalGen'
  projectVersion = '6.0.0-dev'
  license = 'GPL-3.0-or-later'
  websiteLicense = 'Not declared'
  websiteRepo = 'https://github.com/SZXC-WG/szxc-wg.github.io'
  siteUrl = 'https://szxc-wg.github.io/'
  sourceRepo = 'https://github.com/SZXC-WG/LocalGen-new'
  releasesUrl = 'https://github.com/SZXC-WG/LocalGen-new/releases'
  issuesUrl = 'https://github.com/SZXC-WG/LocalGen-new/issues'
  pullsUrl = 'https://github.com/SZXC-WG/LocalGen-new/pulls'
  discussionsUrl = 'https://github.com/SZXC-WG/LocalGen-new/discussions'
  actionsUrl = 'https://github.com/SZXC-WG/LocalGen-new/actions'
  communityEmail = 'lzhang0903@outlook.com'
  copyright = 'SZXC Work Group'

[languages]
  [languages.en]
    label = 'English'
    locale = 'en-US'
    contentDir = 'content'
    weight = 1
    title = 'LocalGen'
  [languages.zh]
    label = '中文'
    locale = 'zh-CN'
    contentDir = 'content'
    weight = 2
    title = 'LocalGen'
