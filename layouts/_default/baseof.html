<!doctype html>
<html lang="{{ .Site.Language.Locale | default .Site.Language.Lang }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body id="top">
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="site-shell">
      {{ partial "header.html" . }}
      <main id="main" class="main-content">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
  </body>
</html>
