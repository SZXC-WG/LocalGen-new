  <stop offset="100%" stop-color="#f2bd64" />
</linearGradient>
<linearGradient id="accentArea" x1="0" x2="0" y1="0" y2="1">
  <stop offset="0%" stop-color="#38c8b5" stop-opacity="0.26" />
  <stop offset="100%" stop-color="#38c8b5" stop-opacity="0.02" />
</linearGradient>
