<svg xmlns="http://www.w3.org/2000/svg" width="820" height="460" viewBox="0 0 820 460" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">LocalGen project signal board</title>
  <desc id="desc">A strategy board with LocalGen project branch, toolchain, scale, and maintainer information.</desc>
  <defs>
<linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
  <stop offset="0%" stop-color="#14181e" />
  <stop offset="100%" stop-color="#101318" />
</linearGradient>
<linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
  <stop offset="0%" stop-color="#1e242c" />
  <stop offset="100%" stop-color="#181d24" />
</linearGradient>
<linearGradient id="accentLine" x1="0" x2="1" y1="0" y2="0">
