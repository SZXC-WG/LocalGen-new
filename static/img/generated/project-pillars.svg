<svg xmlns="http://www.w3.org/2000/svg" width="820" height="472" viewBox="0 0 820 472" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">LocalGen project pillars</title>
  <desc id="desc">Four LocalGen pillars: offline matches, map creation, bot research, and the Qt6 foundation.</desc>
  <defs>
<linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
  <stop offset="0%" stop-color="#14181e" />
  <stop offset="100%" stop-color="#101318" />
</linearGradient>
<linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
  <stop offset="0%" stop-color="#1e242c" />
  <stop offset="100%" stop-color="#181d24" />
</linearGradient>
<linearGradient id="accentLine" x1="0" x2="1" y1="0" y2="0">
  <stop offset="0%" stop-color="#38c8b5" />
  <stop offset="100%" stop-color="#f2bd64" />
</linearGradient>
<linearGradient id="accentArea" x1="0" x2="0" y1="0" y2="1">
  <stop offset="0%" stop-color="#38c8b5" stop-opacity="0.26" />
  <stop offset="100%" stop-color="#38c8b5" stop-opacity="0.02" />
</linearGradient>
<pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
  <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#293239" stroke-width="1" />
</pattern>
<filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
  <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.24" />
</filter>
  </defs>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
<rect width="820" height="472" rx="28" fill="url(#background)" />
<rect width="820" height="472" rx="28" fill="url(#grid)" opacity="0.32" />
<g filter="url(#softShadow)"><rect x="18" y="18" width="784" height="436" rx="22" fill="#181d24" stroke="#364149" stroke-width="1" /></g>
<text x="32" y="62" font-size="12" fill="#38c8b5" font-weight="750" letter-spacing="1.8">PROJECT PILLARS</text>
<text x="32" y="96" font-size="27" font-weight="750" fill="#f1f5f6">Why LocalGen feels different</text>
<text x="32" y="124" font-size="12" fill="#a3adb2" text-anchor="start">A local-first strategy game, an open bot laboratory, and a cleaner Qt-based future.</text>
<rect x="32" y="180" width="178" height="198" rx="18" fill="#1e242c" stroke="#364149" stroke-width="1" /><rect x="32" y="180" width="178" height="3" rx="1.5" fill="#38c8b5" /><circle cx="58" cy="214" r="11" fill="#38c8b5" fill-opacity="0.14" stroke="#38c8b5" stroke-opacity="0.5" /><circle cx="58" cy="214" r="4" fill="#38c8b5" /><text x="52" y="248" font-size="16" font-weight="750" fill="#f1f5f6">Local matches</text><text x="52" y="276" font-size="11" fill="#a3adb2" text-anchor="start">Play offline against the</text><text x="52" y="293" font-size="11" fill="#a3adb2" text-anchor="start">built-in bot roster on</text><text x="52" y="310" font-size="11" fill="#a3adb2" text-anchor="start">random or bundled maps.</text><rect x="52" y="337" width="138" height="25" rx="12.5" fill="#38c8b5" fill-opacity="0.1" /><text x="121.0" y="354" font-size="9" fill="#38c8b5" font-weight="750" text-anchor="middle">master / v6</text><rect x="228" y="180" width="178" height="198" rx="18" fill="#1e242c" stroke="#364149" stroke-width="1" /><rect x="228" y="180" width="178" height="3" rx="1.5" fill="#75aadb" /><circle cx="254" cy="214" r="11" fill="#75aadb" fill-opacity="0.14" stroke="#75aadb" stroke-opacity="0.5" /><circle cx="254" cy="214" r="4" fill="#75aadb" /><text x="248" y="248" font-size="16" font-weight="750" fill="#f1f5f6">Map creator</text><text x="248" y="276" font-size="11" fill="#a3adb2" text-anchor="start">Build and edit v6 maps</text><text x="248" y="293" font-size="11" fill="#a3adb2" text-anchor="start">with metadata in the</text><text x="248" y="310" font-size="11" fill="#a3adb2" text-anchor="start">desktop application.</text><rect x="248" y="337" width="138" height="25" rx="12.5" fill="#75aadb" fill-opacity="0.1" /><text x="317.0" y="354" font-size="9" fill="#75aadb" font-weight="750" text-anchor="middle">46 maps</text><rect x="424" y="180" width="178" height="198" rx="18" fill="#1e242c" stroke="#364149" stroke-width="1" /><rect x="424" y="180" width="178" height="3" rx="1.5" fill="#f2bd64" /><circle cx="450" cy="214" r="11" fill="#f2bd64" fill-opacity="0.14" stroke="#f2bd64" stroke-opacity="0.5" /><circle cx="450" cy="214" r="4" fill="#f2bd64" /><text x="444" y="248" font-size="16" font-weight="750" fill="#f1f5f6">Bot laboratory</text><text x="444" y="276" font-size="11" fill="#a3adb2" text-anchor="start">Compare C++ bots with</text><text x="444" y="293" font-size="11" fill="#a3adb2" text-anchor="start">repeatable, parallel</text><text x="444" y="310" font-size="11" fill="#a3adb2" text-anchor="start">simulator runs.</text><rect x="444" y="337" width="138" height="25" rx="12.5" fill="#f2bd64" fill-opacity="0.1" /><text x="513.0" y="354" font-size="9" fill="#f2bd64" font-weight="750" text-anchor="middle">10 compiled bots</text><rect x="620" y="180" width="178" height="198" rx="18" fill="#1e242c" stroke="#364149" stroke-width="1" /><rect x="620" y="180" width="178" height="3" rx="1.5" fill="#a58bd4" /><circle cx="646" cy="214" r="11" fill="#a58bd4" fill-opacity="0.14" stroke="#a58bd4" stroke-opacity="0.5" /><circle cx="646" cy="214" r="4" fill="#a58bd4" /><text x="640" y="248" font-size="16" font-weight="750" fill="#f1f5f6">Qt6 foundation</text><text x="640" y="276" font-size="11" fill="#a3adb2" text-anchor="start">Build the active</text><text x="640" y="293" font-size="11" fill="#a3adb2" text-anchor="start">cross-platform line with</text><text x="640" y="310" font-size="11" fill="#a3adb2" text-anchor="start">Qt, CMake, and Ninja.</text><rect x="640" y="337" width="138" height="25" rx="12.5" fill="#a58bd4" fill-opacity="0.1" /><text x="709.0" y="354" font-size="9" fill="#a58bd4" font-weight="750" text-anchor="middle">C++17 / Qt6 / CMake</text>
<text x="32" y="438" font-size="11" fill="#a3adb2">GPL-3.0-or-later · SZXC-WG · generated from project data</text>
  </g>
</svg>
